[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/build"

# Permanent 301 from the legacy *.netlify.app subdomain to the canonical
# firescope.dev domain. Anyone with the old link in their bookmarks or in
# a search-engine result lands on the canonical URL with the path intact.
# force = true is required — without it Netlify only fires the redirect
# when no static file matches, which for SPA index.html never triggers.
[[redirects]]
  from = "https://firescope.netlify.app/*"
  to = "https://firescope.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://firescope.netlify.app/*"
  to = "https://firescope.dev/:splat"
  status = 301
  force = true

# SPA fallback — every other path serves index.html so the client-side
# router can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Vite emits content-hashed filenames under /assets, so they can be cached
# forever — a new deploy emits new filenames and busts the cache automatically.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The static GeoJSON files in /Data are large (8 MB each) and only change
# when we redeploy. Cache them aggressively so toggling layers / revisiting
# the History page doesn't re-download them. SWR keeps it fresh on redeploy.
[[headers]]
  for = "/Data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

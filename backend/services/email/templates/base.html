<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FireScope Alert{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.5; color: #333; margin: 0; padding: 0; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 24px; }
        .header { background: #dc2626; color: white; padding: 16px 24px; font-size: 20px; font-weight: bold; }
        .content { padding: 24px; }
        .footer { padding: 16px 24px; font-size: 12px; color: #666; border-top: 1px solid #eee; }
        .footer a { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">FireScope Alerts</div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <!-- Sign-off — shared across every FireScope email -->
        <div style="padding: 20px 24px 8px 24px; font-size: 15px; color: #374151; line-height: 1.55;">
            Stay safe,<br>
            <strong>The FireScope Team</strong>
        </div>
        <div style="padding: 4px 24px 20px 24px;">
            <a href="https://firescope.netlify.app" style="text-decoration: none;">
                <img src="https://firescope.netlify.app/firescope-logo.png"
                     alt="FireScope"
                     width="140"
                     style="display: block; max-width: 140px; height: auto; border: 0;">
            </a>
        </div>
        <div class="footer">
            <p>You received this email because you subscribed to wildfire risk alerts.</p>
            <p><a href="{{ unsubscribe_url }}">Unsubscribe</a> from future alerts.</p>
            <p><em>This alert is for informational purposes. Follow local authorities for evacuation decisions.</em></p>
        </div>
    </div>
</body>
</html>

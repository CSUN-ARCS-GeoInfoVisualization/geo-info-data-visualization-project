name: Daily training ingest + gated retrain

# Continuous model improvement, fully in GitHub (zero database cost-risk):
#   1. ingest  : ask the backend for a day of FIRMS detections + computed
#                features, append them to the committed california_daily.csv.
#   2. retrain : evaluate a monotonic candidate against the gate.
#                - scheduled runs are DRY-RUN (log the decision, never touch the
#                  production model).
#                - to actually promote (swap the live model), trigger manually
#                  with promote=true.
#   3. commit  : always commit the grown daily dataset; commit the model only on
#                a promote run.
# The training set lives entirely in the repo (free, no DB). Retrain compute runs
# on GitHub-hosted runners, off the Render web service.

on:
  schedule:
    - cron: '0 8 * * *'        # 08:00 UTC daily (after the 06:00 prewarm)
  workflow_dispatch:
    inputs:
      promote:
        description: 'Promote the model if the gate passes (commits + deploys)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write   # needed for `gh workflow run` to dispatch sync-domain-deployment

jobs:
  ingest-and-retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        # requirements.txt covers inference (numpy/scikit-learn/joblib); pandas is
        # training-only, so add it explicitly for the retrain step.
        run: pip install -r backend/requirements.txt pandas

      - name: Ingest a day of FIRMS detections + features
        env:
          INGEST_TOKEN: ${{ secrets.INTERNAL_CRON_TOKEN }}
        run: |
          python - <<'PY'
          import os, csv, json, urllib.request
          token = os.environ["INGEST_TOKEN"]
          base = "https://firescope-api.onrender.com/api/internal/ml"

          def post(path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(base + path, data=data, method="POST",
                  headers={"X-Internal-Token": token, "Content-Type": "application/json"})
              return json.load(urllib.request.urlopen(req, timeout=130))

          def alert(subject, message):
              try: post("/alert", {"subject": subject, "message": message})
              except Exception as e: print("alert send failed:", e)

          data = post("/ingest?days=1")
          rows, cols = data.get("rows", []), data.get("columns", [])
          dropped = (data.get("dropped_detail") or []) + (data.get("cross_source_detail") or [])
          print(f"fires_seen={data.get('fires_seen')} new_rows={len(rows)} "
                f"dropped={data.get('dropped')} cross_dropped={data.get('cross_source_dropped')} "
                f"lowconf={data.get('firms_lowconf_dropped')} quality_ok={data.get('quality_ok')}")

          # #4 Quarantine: keep a record of every dropped row + reason for review.
          if dropped:
              qpath = "backend/ml/training_data/quarantine.csv"
              exists = os.path.exists(qpath)
              with open(qpath, "a", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=["lat", "lon", "reason"])
                  if not exists: w.writeheader()
                  for d in dropped:
                      w.writerow({"lat": d.get("lat"), "lon": d.get("lon"), "reason": d.get("reason")})
              print(f"quarantined {len(dropped)} rows -> {qpath}")

          # #3 Feed-outage / quality alert.
          if not rows or data.get("quality_ok") is False:
              alert("daily ingest produced no usable data" if not rows else "daily ingest quality_ok=false",
                    json.dumps({k: data.get(k) for k in
                                ("fires_seen","count","dropped","cross_source_dropped","quality_ok")}, indent=2))

          if not rows:
              raise SystemExit(0)
          path = "backend/ml/training_data/california_daily.csv"
          exists = os.path.exists(path)
          with open(path, "a", newline="") as f:
              w = csv.DictWriter(f, fieldnames=cols)
              if not exists:
                  w.writeheader()
              for r in rows:
                  w.writerow({c: r.get(c) for c in cols})
          print(f"appended {len(rows)} rows -> {path}")
          PY

      - name: Gated retrain
        working-directory: backend
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.promote }}" = "true" ]; then
            echo "PROMOTE mode"; python -m ml.retrain_and_gate --now "$NOW"
          else
            echo "DRY-RUN mode"; python -m ml.retrain_and_gate --dry-run --now "$NOW"
          fi

      - name: Commit dataset (+ model if promoted)
        run: |
          git config user.name 'IdoCohen560'
          git config user.email 'ido.the.cohen@gmail.com'
          git add backend/ml/training_data/california_daily.csv \
                  backend/ml/training_data/quarantine.csv || true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.promote }}" = "true" ]; then
            git add backend/ml/models/wildfire_model_predictive.pkl \
                    backend/ml/models/wildfire_scaler_predictive.pkl \
                    backend/ml/models/model_metadata.json \
                    backend/ml/models/RETRAIN_LOG.md \
                    backend/ml/models/archive || true
          fi
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ml: daily ingest$( [ "${{ inputs.promote }}" = "true" ] && echo ' + model promotion')  ($(date -u +%F))"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi
        id: commit

      - name: Trigger domain-deployment sync (deploy)
        # A push made with GITHUB_TOKEN does NOT trigger other workflows, so the
        # commit above won't auto-fire sync-domain-deployment. workflow_dispatch
        # IS an allowed exception, so trigger it explicitly to reach Render/Netlify.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run sync-domain-deployment.yml --repo "${{ github.repository }}"

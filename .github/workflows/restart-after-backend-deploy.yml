name: Restart Render after backend deploy

# WHY: Render reports a deploy "live" but does NOT reliably restart the gunicorn
# process, so old workers keep serving stale code (root-caused 2026-06-03 — this
# was behind every "my backend change didn't go live" issue all session). A
# service restart DOES swap the code (verified: 77 -> 7 fire count at 75s).
# So: on any backend change, wait for the Render deploy to land, then restart.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: render-restart
  cancel-in-progress: false

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the new Render deploy, then restart the service
        env:
          KEY: ${{ secrets.RENDER_API_KEY }}
          SVC: srv-d71dltgule4c73cqkbj0
        run: |
          api() { curl -s -H "Authorization: Bearer $KEY" "https://api.render.com/v1/$1"; }
          latest_id() { api "services/$SVC/deploys?limit=1" | python3 -c "import json,sys;d=json.load(sys.stdin);print((d[0].get('deploy',d[0])).get('id',''))"; }
          status_of() { api "services/$SVC/deploys/$1" | python3 -c "import json,sys;print(json.load(sys.stdin).get('status',''))"; }

          BEFORE=$(latest_id); echo "deploy before this push: $BEFORE"
          # the sync-domain-deployment workflow + Render's build take a bit to start
          echo "waiting for a NEW deploy to be triggered + go live..."
          NEW=""
          for i in $(seq 1 40); do
            CUR=$(latest_id)
            if [ -n "$CUR" ] && [ "$CUR" != "$BEFORE" ]; then NEW="$CUR"; break; fi
            sleep 15
          done
          if [ -z "$NEW" ]; then echo "No new deploy detected in ~10min — restarting anyway to be safe."; else
            echo "new deploy: $NEW — waiting for it to go live..."
            for i in $(seq 1 30); do
              ST=$(status_of "$NEW"); echo "  status: $ST"
              case "$ST" in live) break;; build_failed|update_failed|canceled) echo "deploy failed; skipping restart"; exit 0;; esac
              sleep 20
            done
          fi
          echo "restarting service so workers load the new code..."
          curl -s -X POST -H "Authorization: Bearer $KEY" "https://api.render.com/v1/services/$SVC/restart" -w "restart HTTP %{http_code}\n"
          echo "Backend restart triggered — new code will be live in ~60-90s."

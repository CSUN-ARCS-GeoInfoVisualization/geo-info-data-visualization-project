name: Daily zone-risk pre-warm

# Hits each of the 4 zone-risk endpoints once a day so the first user after a
# deploy or cache wipe always gets a sub-second response instead of a 60-150s
# cold compute. The endpoints themselves do all the heavy lifting:
#   1. live weather (Open-Meteo) for each centroid
#   2. EVI from MODIS via GEE (cached 16d)
#   3. Elevation from USGS 3DEP (cached forever)
#   4. KBDI from NASA POWER (cached 24h — see feature_cache_kbdi)
#   5. ML inference (calibrated RF, 6 features)
#   6. Write zone_risk_cache row
#
# Workflow is intentionally a no-code shell job — it just curls the live API.
# No secrets needed. Survives Render outages (will simply fail loudly).

on:
  schedule:
    # 06:00 UTC = 23:00 PT (previous day) — quiet hours, ahead of typical CA wake
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-prewarm
  cancel-in-progress: false

jobs:
  prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Pre-warm per-tile feature caches (0.05° CA grid)
        env:
          API_BASE: https://firescope-api.onrender.com/api
        run: |
          set -e
          echo "Triggering tile-cache backfill..."
          start=$(date +%s)
          http=$(curl -s -X POST -o /tmp/tiles.json -w '%{http_code}' --max-time 900 "$API_BASE/research/admin/prewarm-tiles")
          echo "tile prewarm: HTTP=$http elapsed=$(($(date +%s) - start))s"
          cat /tmp/tiles.json
          [ "$http" = "200" ] || exit 1

      - name: Pre-warm 4 zone endpoints
        env:
          API_BASE: https://firescope-api.onrender.com/api/research
        run: |
          set -e
          declare -A endpoints=(
            [counties]="$API_BASE/risk-by-county"
            [zip-codes]="$API_BASE/risk-by-zone/zip-codes"
            [neighborhoods]="$API_BASE/risk-by-zone/neighborhoods"
            [census-tracts]="$API_BASE/risk-by-zone/census-tracts"
          )

          declare -A times
          declare -A statuses
          declare -A sizes

          for zone in counties zip-codes neighborhoods census-tracts; do
            url="${endpoints[$zone]}?cb=$(date +%s)"
            start=$(date +%s)
            http=$(curl -s -o "/tmp/${zone}.json" -w '%{http_code}' --max-time 180 "$url")
            elapsed=$(( $(date +%s) - start ))
            size=$(wc -c < "/tmp/${zone}.json")
            times[$zone]=$elapsed
            statuses[$zone]=$http
            sizes[$zone]=$size
            echo "[$zone] ${elapsed}s HTTP=$http size=${size}B"
          done

          echo
          echo "===== Pre-warm summary ====="
          fail=0
          for zone in counties zip-codes neighborhoods census-tracts; do
            if [ "${statuses[$zone]}" != "200" ]; then
              echo "FAIL $zone HTTP=${statuses[$zone]} (${times[$zone]}s)"
              fail=1
            else
              echo "OK   $zone ${times[$zone]}s ${sizes[$zone]}B"
            fi
          done

          # Verify kbdi field present in at least one zone of each endpoint
          for zone in counties zip-codes neighborhoods census-tracts; do
            [ "${statuses[$zone]}" = "200" ] || continue
            has_kbdi=$(python3 -c "
          import json
          d = json.load(open('/tmp/${zone}.json'))
          zones = d.get('counties') or d.get('zones') or {}
          first = next(iter(zones.values()), {}) if zones else {}
          print('true' if 'kbdi' in first.get('features', {}) else 'false')
          ")
            if [ "$has_kbdi" = "true" ]; then
              echo "KBDI ✓ $zone"
            else
              echo "KBDI ✗ $zone (model output missing kbdi field)"
              fail=1
            fi
          done

          exit $fail
